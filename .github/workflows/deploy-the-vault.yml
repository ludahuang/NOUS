name: Deploy NOUS Atlas and The Vault

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare NOUS public site
        run: |
          mkdir -p dist
          cp -R site/. dist/
          mkdir -p dist/assets
          cp projects/the-vault/runtime/vendor/three.min.js dist/assets/three.min.js
          mkdir -p dist/the-vault
          cp -R projects/the-vault/runtime/release/the-vault-2.0-agentic/. dist/the-vault/
          touch dist/.nojekyll

      - name: Verify publication structure
        run: |
          test -f dist/index.html
          test -f dist/styles.css
          test -f dist/assets/three.min.js
          test -f dist/the-vault/index.html
          test -f dist/the-vault/script.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
