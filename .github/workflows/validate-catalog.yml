name: Validate NOUS catalog

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - codex/nous-root-architecture
    paths:
      - "catalog/**"
      - "research/sites/**"
      - "schemas/**"
      - "scripts/validate_catalog.rb"
      - "nous.yaml"
      - ".github/workflows/validate-catalog.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Validate catalog
        run: ruby scripts/validate_catalog.rb
