<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=https://ludahuang.github.io/the-vault/" />
    <link rel="canonical" href="https://ludahuang.github.io/the-vault/" />
    <title>The Vault 已迁移</title>
    <script>
      (() => {
        const destination = new URL("https://ludahuang.github.io/the-vault/");
        destination.search = window.location.search;
        destination.hash = window.location.hash;
        window.location.replace(destination.toString());
      })();
    </script>
  </head>
  <body>
    <p>
      The Vault 已迁移至
      <a href="https://ludahuang.github.io/the-vault/">新地址</a>。
    </p>
  </body>
</html>
